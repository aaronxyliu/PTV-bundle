name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.node-label }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - node-version: 20.x
            node-label: Node.js 20 LTS
          - node-version: 22.x
            node-label: Node.js 22 Current

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
